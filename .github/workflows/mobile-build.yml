name: Build mobile userscript

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run verify:dates
      - run: pnpm run build
      - name: Publish userscript to branch
        run: |
          cp dist/yandere-masonry.user.js booru-mobile-safari.user.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add booru-mobile-safari.user.js
          git diff --cached --quiet || git commit -m "build: update mobile userscript [skip ci]"
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: booru-mobile-safari-userscript
          path: dist/yandere-masonry.user.js
