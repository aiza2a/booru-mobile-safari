name: Build mobile userscript

on:
  push:
    branches:
      - mobile-safari
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: booru-mobile-safari-userscript
          path: dist/yandere-masonry.user.js
